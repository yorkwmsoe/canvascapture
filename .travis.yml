matrix:
  include:
    - os: osx
      osx_image: xcode10.2
      language: node_js
      node_js: "20"

before_install:
  - npm install -g pnpm

install:
  - cd canvas-capture/
  - pnpm install
  - pnpm package
  - cd ../apps/desktop
  - pnpm install

script:
  pnpm build:mac

before_deploy:
  - export TRAVIS_TAG="1.0.$TRAVIS_BUILD_NUMBER"
  - echo "$TRAVIS_TAG" "TRAVIS_COMMIT"
  - git config --local user.name "yorkwmsoe"
  - git config --local user.email "yorkw@msoe.edu"
  - git tag "$TRAVIS_TAG" "$TRAVIS_COMMIT"

deploy:
  provider: releases
  tag_name: $TRAVIS_TAG
  target_commitish: $TRAVIS_COMMIT
  name: $TRAVIS_TAG
  overwrite: true
  api_key:
    secure: 
  file: "apps/desktop/dist/*.dmg"
  cleanup: false
  on:
    tags: true
    branch: main